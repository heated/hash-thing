# hash-thing CI: cross-platform build, test, and release packaging.
#
# Build and test on Mac/Linux/Windows runners so OS-specific breakage (wgpu
# backends, winit platform bindings, target-triple-only code paths) surfaces
# before it lands on main. Originally landed as xb7.1; xb7.3 added the Linux
# AppImage wrapper and xb7.4 added per-platform binary artifact upload.
#
# What this runs per platform:
#   1. cargo fmt --check    (fast, catches format drift)
#   2. cargo clippy -D warn (catches lints)
#   3. cargo build --release
#   4. cargo test --release
#   5. upload bare release binary (xb7.4)
#   6. Linux-only: wrap binary in an AppImage and upload that too (xb7.3)
#
# Still open in xb7: macOS notarization (xb7.2 — needs Apple Developer ID
# cert as a repo secret), WASM/WebGPU build (xb7.5 — needs distribution
# story), Steam (xb7.6 — deferred).
#
# Tests don't initialize a GPU — they're all pure octree/store/terrain/sim
# logic — so a headless Linux runner works fine. The renderer code still has
# to *compile* against wgpu/winit, which is where platform-specific breakage
# typically lives.
#
# Caching strategy: Swatinem/rust-cache handles `~/.cargo/registry`,
# `~/.cargo/git`, and `target/` keyed on Cargo.lock + rustc version. Cache
# is per-platform (separate keys), which is what we want — Linux wgpu objects
# won't relink on Mac.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual reruns without needing a push (e.g. after a runner upgrade).
  workflow_dispatch:

# Release binary artifacts (xb7.3 bare-binary fallback + xb7.4) — every
# successful build uploads the freshly linked binary so humans can pull
# it from the run page without re-running locally. Tag-driven releases
# (xb7.2 macOS notarization, xb7.3 proper AppImage wrapping) happen on
# top of these artifacts, not instead of them.

# Cancel stale runs on the same ref so a rapid push sequence doesn't eat
# runner minutes waiting for superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Deny warnings everywhere — clippy lines already do, but RUSTFLAGS catches
  # plain `rustc` warnings during `cargo build` too.
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      # One platform failing shouldn't cancel the others — we want the full
      # matrix signal on every run, not a race to the first failure.
      fail-fast: false
      matrix:
        include:
          # `artifact_name` is the filename uploaded from each runner. Using
          # a per-OS suffix keeps the Windows `.exe` extension explicit and
          # avoids name collisions when someone downloads all three and
          # drops them in the same folder.
          - name: Linux
            os: ubuntu-latest
            artifact_name: hash-thing-linux-x86_64
            binary_path: target/release/hash-thing
          - name: macOS
            os: macos-latest
            artifact_name: hash-thing-macos-aarch64
            binary_path: target/release/hash-thing
          - name: Windows
            os: windows-latest
            artifact_name: hash-thing-windows-x86_64.exe
            binary_path: target/release/hash-thing.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux runners ship without the wayland/xkbcommon headers that winit
      # links against when building with the default features. Installing
      # them keeps the workflow target-agnostic (no need to disable winit
      # features just to pass CI).
      #
      # libfuse2 is for the AppImage build step (xb7.3): linuxdeploy and
      # appimagetool are themselves AppImages and require libfuse2 to run.
      # ubuntu-22.04+ stopped shipping libfuse2 by default; the alternative
      # is `--appimage-extract-and-run`, but installing the lib is simpler
      # and shaves a few seconds off each invocation.
      - name: Install Linux winit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Shared key segment lets all jobs on the same Cargo.lock reuse
          # the same registry download; target/ stays per-OS automatically.
          shared-key: hash-thing

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo build (release)
        run: cargo build --release

      - name: cargo test (release)
        run: cargo test --release

      # Upload the freshly linked release binary as a workflow artifact.
      # xb7.4 closes this loop for Windows (.exe); xb7.3 still wants a
      # proper AppImage wrapper on top, and xb7.2 still wants macOS
      # notarization — but both now have a known-good upstream artifact
      # to build on. Retention defaults to the repo policy (90 days);
      # we don't override it because these are development builds, not
      # release artifacts.
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

      # AppImage wrapping (xb7.3). Linux-only. Pulls linuxdeploy from its
      # rolling-release channel (linuxdeploy doesn't tag), stages an AppDir
      # with the freshly built binary plus the .desktop file + placeholder
      # icon from packaging/linux/, and produces a single-file .AppImage.
      #
      # `OUTPUT` env var pins the output filename so the upload step has a
      # stable glob to grab. Without it linuxdeploy derives the name from
      # the .desktop file's `Name=` and the host arch, which is fine but
      # changes if anyone renames the app — better to be explicit.
      #
      # The bundled libraries are whatever linuxdeploy autodetects from the
      # binary's ELF deps. For a winit + wgpu app this typically pulls in
      # libwayland, libxkbcommon, libX11, etc. — the same libs the
      # `Install Linux winit deps` step installed at build time. The
      # AppImage will fall back to system libs at run time if available
      # (the standard AppImage rpath behavior).
      - name: Build AppImage
        if: runner.os == 'Linux'
        env:
          OUTPUT: hash-thing-x86_64.AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/hash-thing \
            --desktop-file packaging/linux/hash-thing.desktop \
            --icon-file packaging/linux/hash-thing.svg \
            --output appimage

      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: hash-thing-linux-x86_64.AppImage
          path: hash-thing-x86_64.AppImage
          if-no-files-found: error
