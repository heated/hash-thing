name: CI

on:
  push:
    branches: [main]
  pull_request:

# Minimal default permissions; downstream xb7.2/3/4 jobs will extend at
# the job level (releases, packages).
permissions:
  contents: read

# Cancel in-flight runs on PRs only — never on main pushes, so a fast
# follow-up commit doesn't kill the integration build of the previous one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation on CI is slower than non-incremental and bloats
  # the cache. Warning gating lives in [lints.rust] in Cargo.toml, NOT in
  # workflow-level RUSTFLAGS (which would poison the dep graph and the cache
  # fingerprint).
  CARGO_INCREMENTAL: "0"
  # Override sccache wrapper from .cargo/config.toml — CI doesn't have it.
  RUSTC_WRAPPER: ""

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  build:
    name: build (${{ matrix.os }})
    needs: actionlint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      # See all platforms light up red on a multi-platform regression
      # rather than cancelling siblings on first failure.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            run-tests: true
            artifact_name: hash-thing-linux-x86_64
            binary_path: target/release/hash-thing
          - os: macos-15
            run-tests: true
            artifact_name: hash-thing-macos-aarch64
            binary_path: target/release/hash-thing
          - os: windows-2025
            run-tests: true
            artifact_name: hash-thing-windows-x86_64.exe
            binary_path: target/release/hash-thing.exe
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The dtolnay action reads rust-toolchain.toml at the repo root, so
      # the channel pin lives there, not in the workflow.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-04-11
        with:
          components: clippy

      - name: Linux system deps (winit / wgpu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcursor-dev libxi-dev libxrandr-dev \
            libudev-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libfuse2

      - name: Cache cargo
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          shared-key: ci-${{ matrix.os }}
          # Only main pushes write to the cache; PRs read from it. Keeps the
          # 10GB cache budget from thrashing on busy branches.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Gating compile-check across all targets, all platforms. This is the
      # ONLY step that compiles test code on Mac/Windows; if it passes here,
      # the test code at minimum builds on every supported OS.
      - name: Compile-check (all targets, gating)
        run: cargo check --all-targets --locked

      - name: Test
        if: matrix.run-tests
        run: cargo test --locked

      # Gating: fmt drift backlog is clear (hash-thing-k5r closed). rustfmt
      # output is deterministic across platforms, so running on the ubuntu
      # leg only is sufficient.
      - name: Cargo fmt
        if: matrix.os == 'ubuntu-24.04'
        run: cargo fmt --check

      # Gating: clippy backlog is clear (hash-thing-00f closed).
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # Build release binary for artifact upload (xb7.4).
      - name: Build release binary
        run: cargo build --release --locked

      # Upload the freshly linked release binary as a workflow artifact.
      # Retention defaults to repo policy (90 days); these are development
      # builds, not release artifacts.
      - name: Upload release binary
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

      # AppImage wrapping (xb7.3). Linux-only. Pulls linuxdeploy from its
      # rolling-release channel, stages an AppDir with the freshly built
      # binary plus the .desktop file + placeholder icon from packaging/linux/,
      # and produces a single-file .AppImage.
      - name: Build AppImage
        if: matrix.os == 'ubuntu-24.04'
        env:
          OUTPUT: hash-thing-x86_64.AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/hash-thing \
            --desktop-file packaging/linux/hash-thing.desktop \
            --icon-file packaging/linux/hash-thing.svg \
            --output appimage

      - name: Upload AppImage
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: hash-thing-linux-x86_64.AppImage
          path: hash-thing-x86_64.AppImage
          if-no-files-found: error

  wasm-build:
    name: WASM/WebGPU build
    needs: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          shared-key: ci-wasm
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build WASM package
        run: wasm-pack build --target web --out-dir web/pkg

      - name: Upload WASM artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: hash-thing-wasm
          path: |
            web/index.html
            web/pkg/
          if-no-files-found: error
