name: CI

on:
  push:
    branches: [main]
  pull_request:

# Minimal default permissions; downstream xb7.2/3/4 jobs will extend at
# the job level (releases, packages).
permissions:
  contents: read

# Cancel in-flight runs on PRs only — never on main pushes, so a fast
# follow-up commit doesn't kill the integration build of the previous one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation on CI is slower than non-incremental and bloats
  # the cache. Warning gating lives in [lints.rust] in Cargo.toml, NOT in
  # workflow-level RUSTFLAGS (which would poison the dep graph and the cache
  # fingerprint).
  CARGO_INCREMENTAL: "0"

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  build:
    name: build (${{ matrix.os }})
    needs: actionlint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      # See all platforms light up red on a multi-platform regression
      # rather than cancelling siblings on first failure.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            run-tests: true
          - os: macos-15
            run-tests: false
          - os: windows-2025
            run-tests: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The dtolnay action reads rust-toolchain.toml at the repo root, so
      # the channel pin lives there, not in the workflow.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-04-11
        with:
          components: clippy

      - name: Linux system deps (winit / wgpu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcursor-dev libxi-dev libxrandr-dev \
            libudev-dev \
            libgl1-mesa-dev libegl1-mesa-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          shared-key: ci-${{ matrix.os }}
          # Only main pushes write to the cache; PRs read from it. Keeps the
          # 10GB cache budget from thrashing on busy branches.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Gating compile-check across all targets, all platforms. This is the
      # ONLY step that compiles test code on Mac/Windows; if it passes here,
      # the test code at minimum builds on every supported OS.
      - name: Compile-check (all targets, gating)
        run: cargo check --all-targets --locked

      - name: Test
        if: matrix.run-tests
        run: cargo test --locked

      # Warn-only until hash-thing-k5r closes out the fmt drift backlog
      # (store.rs / renderer.rs / svdag.rs / rule.rs / world.rs). rustfmt
      # output is deterministic across platforms, so running on the ubuntu
      # leg only is sufficient — no point burning mac+windows minutes on
      # the same diff. Flip to gating once drift clears.
      - name: Cargo fmt (warn-only until hash-thing-k5r)
        if: matrix.os == 'ubuntu-24.04'
        run: cargo fmt --check
        continue-on-error: true

      # Warn-only until hash-thing-00f closes out the existing clippy backlog.
      # Compile errors will already have been caught above by `cargo check`,
      # so leaving this step at continue-on-error doesn't hide build breakage.
      - name: Clippy (warn-only until hash-thing-00f)
        run: cargo clippy --all-targets --locked
        continue-on-error: true
