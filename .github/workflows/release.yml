name: Release

# Tag-triggered release workflow. Parallel to ci.yml, which only compile-
# checks on every push. This workflow runs the full release profile and
# attaches built artifacts to the GitHub release created from the tag.
#
# Release scope:
# - Windows .exe
# - Linux bare binary
# - macOS notarized .app zip
#
# Linux AppImage publishing remains follow-up xb7.3; ci.yml already builds
# an AppImage as a workflow artifact, but release.yml still only publishes
# the bare Linux binary.
#
# Inherits the SHA-pinning + warning-gating patterns established by
# hash-thing-xb7.1 in .github/workflows/ci.yml.

on:
  push:
    tags: ['v*']
  # Manual trigger for dry-run testing without creating a real tag. The
  # publish step is gated to push events only, so dispatch exercises the
  # build + actionlint path without touching release assets.
  workflow_dispatch:

# contents: write is required by `gh release create/upload` to create and
# attach release assets. The actionlint job runs with its own read-only
# permissions block.
permissions:
  contents: write

# Never cancel an in-flight release build. Multiple tags can publish in
# parallel as long as they target different refs.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation is slower on CI and bloats the cache. Warning
  # gating lives in [lints.rust] in Cargo.toml, not workflow RUSTFLAGS,
  # so the release cache fingerprint stays clean.
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: ""

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  macos-notarized:
    name: macOS notarized app (release)
    needs: actionlint
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-04-11

      - name: Cache cargo (release)
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          shared-key: release-macos-15
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build release binary
        run: cargo build --release --locked

      # Required secrets for tag pushes:
      # - MACOS_CERTIFICATE_P12_BASE64: base64-encoded Developer ID Application .p12
      # - MACOS_CERTIFICATE_PASSWORD: password for the .p12 export
      # - MACOS_CODESIGN_IDENTITY: full "Developer ID Application: ..." identity
      # - MACOS_NOTARY_APPLE_ID / MACOS_NOTARY_TEAM_ID / MACOS_NOTARY_PASSWORD:
      #   Apple ID + team ID + app-specific password for notarytool
      - name: Import Developer ID cert and store notarytool profile
        if: github.event_name == 'push'
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail

          for var in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_NOTARY_APPLE_ID \
            MACOS_NOTARY_TEAM_ID \
            MACOS_NOTARY_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::required secret $var is empty or unset"
              exit 1
            fi
          done

          keychain_path="$RUNNER_TEMP/hash-thing-signing.keychain-db"
          keychain_password="$(openssl rand -hex 16)"
          cert_path="$RUNNER_TEMP/hash-thing-dev-id.p12"
          profile_name="hash-thing-notary"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$cert_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          existing_keychains=$(security list-keychains -d user | tr -d '"')
          # shellcheck disable=SC2086
          # Intentional word splitting for multiple keychain paths.
          security list-keychains -d user -s "$keychain_path" $existing_keychains
          security default-keychain -d user -s "$keychain_path"

          xcrun notarytool store-credentials "$profile_name" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --keychain "$keychain_path"

          {
            echo "MACOS_KEYCHAIN_PATH=$keychain_path"
            echo "MACOS_NOTARY_PROFILE=$profile_name"
          } >> "$GITHUB_ENV"

      - name: Build notarized macOS archive
        if: github.event_name == 'push'
        shell: bash
        env:
          MACOS_APP_NAME: hash-thing
          MACOS_APP_VERSION: ${{ github.ref_name }}
          MACOS_ARCHIVE_NAME: hash-thing-macos-aarch64.zip
          MACOS_BUNDLE_ID: io.github.heated.hash-thing
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          mkdir -p dist
          scripts/notarize-macos-app.sh target/release/hash-thing dist

      - name: Publish notarized macOS archive to GitHub release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          artifact="dist/hash-thing-macos-aarch64.zip"
          if [ ! -f "$artifact" ]; then
            echo "::error::expected $artifact but notarization did not produce it"
            exit 1
          fi

          if ! gh release create "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes; then
            echo "release $TAG already exists — uploading asset with --clobber"
            gh release upload "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

      - name: Cleanup temporary signing material
        if: always() && github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${MACOS_KEYCHAIN_PATH:-}" ] && [ -f "$MACOS_KEYCHAIN_PATH" ]; then
            security delete-keychain "$MACOS_KEYCHAIN_PATH" || true
          fi

  windows-exe:
    name: Windows .exe (release)
    needs: actionlint
    runs-on: windows-2025
    # Release builds are slower than per-push debug checks — give them
    # a bigger budget. 45 min is comfortably above a cold compile on
    # windows-2025 and still well inside GitHub's 360-minute ceiling.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # dtolnay/rust-toolchain reads rust-toolchain.toml at the repo root,
      # so the channel pin lives there, not in the workflow. No components
      # are needed for a release build.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-04-11

      # Separate shared-key from ci.yml's windows cache: release and debug
      # profiles produce different target dirs and trying to share a single
      # cache thrashes both.
      - name: Cache cargo (release)
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          shared-key: release-windows-2025
          # Tag builds and main pushes both write to the cache; PR dry-runs
          # (workflow_dispatch from a feature branch) read from it only.
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked

      - name: Publish Windows .exe to GitHub release
        # Gate the publish step to real tag pushes. workflow_dispatch runs
        # only exercise the build + actionlint path and never touch release
        # assets — that way we can dry-run the workflow from a feature
        # branch without accidentally creating a release.
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          artifact="target/release/hash-thing.exe"
          if [ ! -f "$artifact" ]; then
            echo "::error::expected $artifact but it was not produced by cargo build --release"
            exit 1
          fi

          # Idempotent publish: `gh release create` fails if the release
          # already exists (e.g. the linux-bin sibling beat us to it), in
          # which case fall back to `gh release upload --clobber` so the
          # Windows .exe still ends up attached. This pattern scales to
          # xb7.2 (macOS) as it lands.
          if ! gh release create "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes; then
            echo "release $TAG already exists — uploading asset with --clobber"
            gh release upload "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

  linux-bin:
    name: Linux bare binary (release)
    needs: actionlint
    runs-on: ubuntu-24.04
    # Linux cold compile is faster than Windows's but release profile
    # still dominates; 45 min matches the Windows sibling budget.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-04-11

      # winit/wgpu need the same X11/Wayland/EGL stack on Linux that ci.yml
      # installs for per-push compile checks. --no-install-recommends
      # mirrors ci.yml exactly so release builds don't diverge from what
      # CI is validating on every push.
      - name: Linux system deps (winit / wgpu / AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcursor-dev libxi-dev libxrandr-dev \
            libudev-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libfuse2

      - name: Cache cargo (release)
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          shared-key: release-ubuntu-24.04
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Publish Linux bare binary to GitHub release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # No .exe extension on Linux; stage the binary under a qualified
          # name so it doesn't collide with a macOS sibling that might want
          # to publish the same base name (`hash-thing`) to the same release.
          src="target/release/hash-thing"
          if [ ! -f "$src" ]; then
            echo "::error::expected $src but it was not produced by cargo build --release"
            exit 1
          fi

          artifact="hash-thing-linux-x86_64"
          cp "$src" "$artifact"
          chmod +x "$artifact"

          # Same idempotent publish as the windows-exe sibling. The create
          # path wins for whichever platform job finishes first; the other
          # falls back to upload --clobber.
          if ! gh release create "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes; then
            echo "release $TAG already exists — uploading asset with --clobber"
            gh release upload "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

      # AppImage wrapping (hash-thing-679, follow-up to xb7.3). Mirrors
      # ci.yml's AppImage build but pins linuxdeploy by SHA256 — release
      # artifacts must be reproducible across re-runs of the same tag, so
      # the `continuous` rolling channel needs an explicit hash gate. Refresh
      # LINUXDEPLOY_SHA256 (and re-run) when an upstream linuxdeploy update
      # is wanted; the current value was captured 2026-04-25 (mtime
      # 2026-04-12).
      - name: Build AppImage
        shell: bash
        env:
          LINUXDEPLOY_URL: https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          LINUXDEPLOY_SHA256: f10e520f5948ed04ad31b160cca3f79476e1a52bb0f8c184981ce66cdcfa116a
        run: |
          set -euo pipefail
          curl -fsSL -o linuxdeploy-x86_64.AppImage "$LINUXDEPLOY_URL"
          echo "${LINUXDEPLOY_SHA256}  linuxdeploy-x86_64.AppImage" | sha256sum -c -
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/hash-thing \
            --desktop-file packaging/linux/hash-thing.desktop \
            --icon-file packaging/linux/hash-thing.svg \
            --output appimage

      # linuxdeploy derives the output filename from the .desktop Name= field
      # (Hash-Thing-x86_64.AppImage), so rename to the platform-qualified
      # asset name that matches the bare-binary convention before publish.
      - name: Stage AppImage release asset
        shell: bash
        run: |
          set -euo pipefail
          # linuxdeploy emits the file in the workdir; capture the first match.
          src=$(find . -maxdepth 1 -name 'Hash-Thing-*x86_64.AppImage' -print -quit)
          if [ -z "$src" ] || [ ! -f "$src" ]; then
            echo "::error::expected linuxdeploy to produce a Hash-Thing-*x86_64.AppImage"
            find . -maxdepth 1 -name '*.AppImage' -ls || true
            exit 1
          fi
          mv "$src" hash-thing-linux-x86_64.AppImage

      - name: Publish Linux AppImage to GitHub release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          artifact="hash-thing-linux-x86_64.AppImage"
          if [ ! -f "$artifact" ]; then
            echo "::error::expected $artifact but the Build AppImage step did not produce it"
            exit 1
          fi

          # Same idempotent publish pattern as the bare-binary sibling. By
          # this point the bare-binary publish above has already run, so the
          # release exists — the create path falls through to upload.
          if ! gh release create "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes; then
            echo "release $TAG already exists — uploading asset with --clobber"
            gh release upload "$TAG" "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi
