name: Dev Build Cron

# Keep a recent demo-ready macOS binary attached to a workflow run so
# Edward can pull a fresh artifact without waiting on a local cold build.
# This is intentionally narrower than ci.yml: one platform, release mode,
# and a short artifact retention window keep the maintenance cost low.

on:
  schedule:
    # Every 2 hours. Staggered off the hour to reduce scheduler pileups.
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-build-cron-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  macos-demo-binary:
    name: macOS demo binary (release)
    needs: actionlint
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable as of 2026-04-11

      - name: Cache cargo
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014 # v2.7.5
        with:
          shared-key: dev-build-cron-macos-15
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build release binary
        run: cargo build --release --locked

      - name: Upload demo binary
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: hash-thing-demo-macos-aarch64
          path: target/release/hash-thing
          if-no-files-found: error
          retention-days: 3
