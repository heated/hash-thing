<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hash-thing | 3D Hashlife Engine</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #hash-thing-canvas {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    canvas { display: block; }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #e0e0e0;
      font-family: monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="hash-thing-canvas"></div>
  <div id="loading">Loading WASM...</div>
  <script type="module">
    import init from './pkg/hash_thing.js';
    init().then(() => {
      document.getElementById('loading').remove();
    }).catch(err => {
      document.getElementById('loading').textContent = 'Failed to load: ' + err;
      console.error(err);
    });
  </script>
</body>
</html>
