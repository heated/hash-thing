# Faster linking on macOS
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/ld"]

# sccache: cross-worktree compile caching. Each worktree has its own
# target/ dir (no lock contention); sccache shares compiled artifacts.
# CI overrides with RUSTC_WRAPPER="" in its env block.
[build]
rustc-wrapper = "sccache"
