# Faster linking on macOS
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/ld"]

# All worktrees share the main repo's target dir. Deps compile once;
# ~15GB of redundant per-worktree target/ dirs collapse to one ~2GB dir.
# Cargo file-locks prevent parallel-build corruption automatically.
[build]
target-dir = "/Users/edward/projects/hash-thing/target"
